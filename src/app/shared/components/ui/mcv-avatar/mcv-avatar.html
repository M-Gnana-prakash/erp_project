<div class="relative inline-block" [ngClass]="getSizeClasses()">
    <!-- Image -->
    <img *ngIf="src" [src]="src" [alt]="name || 'Avatar'" [ngClass]="[
            'w-full h-full object-cover ring-2 ring-white dark:ring-boxdark',
            rounded ? 'rounded-full' : 'rounded-lg'
        ]" />

    <!-- Initials -->
    <div *ngIf="!src && initials" [ngClass]="[
            'w-full h-full flex items-center justify-center text-white font-semibold ring-2 ring-white dark:ring-boxdark',
            rounded ? 'rounded-full' : 'rounded-lg'
        ]" [ngStyle]="{'background-color': bgColor}">
        {{ initials }}
    </div>

    <!-- Placeholder -->
    <div *ngIf="!src && !initials" [ngClass]="[
            'w-full h-full bg-gray-200 dark:bg-white/10 flex items-center justify-center text-gray-400 ring-2 ring-white dark:ring-boxdark',
            rounded ? 'rounded-full' : 'rounded-lg'
        ]">
        <svg class="w-1/2 h-1/2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
        </svg>
    </div>

    <!-- Status Indicator -->
    <span *ngIf="status" class="absolute bottom-0 right-0 rounded-full ring-2 ring-white dark:ring-boxdark" [ngClass]="[
            getStatusColor(),
            size === 'xs' ? 'w-2 h-2' : size === 'sm' ? 'w-2.5 h-2.5' : 'w-3 h-3'
        ]">
    </span>

    <!-- Badge -->
    <span *ngIf="badge"
        class="absolute -top-1 -right-1 bg-red-500 rounded-full ring-2 ring-white dark:ring-boxdark text-white text-[10px] flex items-center justify-center font-bold px-1 min-w-[18px] h-[18px]">
        {{ badge }}
    </span>
</div>
