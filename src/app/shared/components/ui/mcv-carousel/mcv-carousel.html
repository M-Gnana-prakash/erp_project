<div class="carousel-container" [class.full-screen]="fullScreen">
    <div class="carousel-wrapper" [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'">
        @for (item of items; track $index) {
        <div class="carousel-item">
            <img [src]="item.image" [alt]="item.title || 'Slide ' + $index" />
            <!-- @if (item.title || item.description) {
                    <div class="carousel-caption">
                        @if (item.title) {
                            <h3>{{ item.title }}</h3>
                        }
                        @if (item.description) {
                            <p>{{ item.description }}</p>
                        }
                    </div>
                } -->
        </div>
        }
    </div>

    <!-- Controls -->
    @if (!disablePrev) {
    <button class="carousel-control prev" (click)="prev()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
            class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
    </button>
    }
    @if (!disableNext) {
    <button class="carousel-control next" (click)="next()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
            class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
    </button>
    }

    <!-- Indicators -->
    <div class="carousel-indicators">
        @for (item of items; track $index) {
        <button [class.active]="$index === currentIndex()" (click)="goTo($index)">
        </button>
        }
    </div>
</div>
