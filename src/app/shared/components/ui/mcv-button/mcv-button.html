<button [type]="type" (click)="handleButtonClick($event)" [disabled]="disabled || loading" [ngClass]="[
    'inline-flex items-center justify-center font-medium rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-2',
    getVariantClasses(),
    getSizeClasses(),
    fullWidth ? 'w-full' : '',
    disabled || loading ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer',
    customClass
  ]">
    <!-- Loading Spinner -->
    <svg *ngIf="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-current" xmlns="http://www.w3.org/2000/svg"
        fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
    </svg>

    <!-- Left Icon -->
    <span *ngIf="icon && iconPosition === 'left' && !loading" class="mr-2">
        <i [class]="icon"></i>
    </span>

    <!-- Label -->
    <ng-content></ng-content>
    <span *ngIf="label && !loading">{{ label }}</span>

    <!-- Right Icon -->
    <span *ngIf="icon && iconPosition === 'right' && !loading" class="ml-2">
        <i [class]="icon"></i>
    </span>
</button>
