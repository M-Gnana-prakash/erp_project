<div class="relative group overflow-hidden bg-black" [style.width]="width" [style.height]="height"
    [ngClass]="[getRoundedClass(), customClass]">
    <video #videoPlayer [src]="src" [poster]="poster" [autoplay]="autoplay" [loop]="loop" [muted]="muted"
        [controls]="controls" (timeupdate)="handleTimeUpdate()" (play)="isPlaying.set(true)"
        (pause)="isPlaying.set(false)" class="w-full h-full block">
    </video>

    <!-- Custom Overlay (Optional, if controls are false) -->
    @if (!controls) {
    <div
        class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/20">
        <button (click)="togglePlay()"
            class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white hover:bg-white/40 transition-all">
            @if (!isPlaying()) {
            <svg class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
            }
            @if (isPlaying()) {
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            }
        </button>
    </div>

    <!-- Progress Bar (Custom) -->
    <div class="absolute bottom-0 left-0 right-0 h-1 bg-gray-600">
        <div class="h-full bg-indigo-500 transition-all duration-100" [style.width]="progress() + '%'"></div>
    </div>
    }
</div>
