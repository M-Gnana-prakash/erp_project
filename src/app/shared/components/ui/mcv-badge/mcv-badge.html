<span [ngClass]="[
    'inline-flex items-center flex-shrink-0 gap-1.5 px-2.5 py-0.5 text-[11px] font-bold tracking-wide transition-all whitespace-nowrap leading-none',
    pill ? 'rounded-full' : 'rounded-md',
    getVariantClasses()
  ]">
  @if (dot) {
  <span class="w-1.5 h-1.5 rounded-full" [ngClass]="getDotColor()"></span>
  }
  <ng-content></ng-content>
  @if (label) {
  <span>{{ label }}</span>
  }
</span>
