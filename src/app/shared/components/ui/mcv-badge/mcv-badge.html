<span [ngClass]="[
    'inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-all',
    pill ? 'rounded-full' : 'rounded-md',
    getVariantClasses()
  ]">
    @if (dot) {
    <span class="w-1.5 h-1.5 rounded-full" [ngClass]="getDotColor()"></span>
    }
    <ng-content></ng-content>
    @if (label) {
    <span>{{ label }}</span>
    }
</span>
