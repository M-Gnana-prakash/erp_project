<div class="relative inline-block text-left">
    <!-- Trigger Button -->
    <div [ngClass]="variant === 'split' ? 'inline-flex rounded-lg shadow-sm' : ''">
        <button (click)="toggle()" [ngClass]="[
            'inline-flex items-center justify-center px-4 py-2 text-sm font-medium focus:outline-none transition-all duration-200',
            variant !== 'split' ? 'rounded-lg shadow-sm' : '',
            getButtonClasses()
        ]">
            @if (icon) {
            <span class="mr-2"><i [class]="icon"></i></span>
            }
            {{ label }}
            @if (variant !== 'split') {
            <svg class="w-4 h-4 ml-2 -mr-1 transition-transform duration-200" [ngClass]="isOpen() ? 'rotate-180' : ''"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
            }
        </button>

        <!-- Split Toggle -->
        @if (variant === 'split') {
        <button (click)="toggle()"
            class="px-2 py-2 bg-indigo-600 text-white rounded-r-lg border-l border-indigo-500 hover:bg-indigo-700 focus:outline-none transition-all">
            <svg class="w-4 h-4 transition-transform duration-200" [ngClass]="isOpen() ? 'rotate-180' : ''" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        }
    </div>

    <!-- Dropdown Menu -->
    @if (isOpen()) {
    <div [ngClass]="[
            'absolute z-50 mt-2 min-w-[200px] bg-white dark:bg-boxdark border border-gray-200 dark:border-white/10 rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200',
            align === 'right' ? 'right-0' : 'left-0'
        ]">
        <div class="py-1">
            @for (item of items; track $index) {
            <!-- Section Header -->
            @if (item.section) {
            <div
                class="px-4 py-2 text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest bg-gray-50/50 dark:bg-white/2">
                {{ item.section }}
            </div>
            }

            <!-- Divider -->
            @if (item.divider) {
            <hr class="my-1 border-gray-100 dark:border-white/5" />
            }

            <!-- Regular Item -->
            @if (!item.divider && !item.section) {
            <button (click)="handleItemClick(item)" [ngClass]="[
                            'w-full flex items-center px-4 py-2.5 text-sm transition-colors',
                            item.danger ? 'text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5'
                        ]">
                @if (item.icon) {
                <span class="mr-3 w-4 h-4 flex items-center justify-center opacity-70">{{ item.icon }}</span>
                }
                {{ item.label }}
            </button>
            }
            }

            <!-- Custom Content Slot -->
            <ng-content></ng-content>
        </div>
    </div>
    }
</div>
