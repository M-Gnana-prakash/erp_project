<div class="relative inline-block text-left">
    <!-- Trigger Button -->
    <div [ngClass]="variant === 'split' ? 'inline-flex rounded-lg shadow-sm' : ''">
        <button (click)="toggle()" [ngClass]="[
            'inline-flex items-center justify-center font-medium focus:outline-none transition-all duration-200 cursor-pointer',
            variant !== 'split' ? 'rounded-lg' : '',
            label ? 'px-4 py-2 text-sm' : 'p-2 min-w-[40px] min-h-[40px] text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100',
            getButtonClasses()
        ]">
            @if (icon) {
            <span [ngClass]="label ? 'mr-2' : ''" class="flex items-center justify-center">
                <i [class]="icon" class="text-base opacity-95"></i>
            </span>
            } @else if (!label) {
            <!-- Default 3-dots SVG for icon-only mode with higher contrast -->
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
            </svg>
            }

            @if (label) {
            {{ label }}
            }

            @if (variant !== 'split' && label) {
            <svg class="w-4 h-4 ml-2 -mr-1 transition-transform duration-200" [ngClass]="isOpen() ? 'rotate-180' : ''"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
            }
        </button>

        <!-- Split Toggle -->
        @if (variant === 'split') {
        <button (click)="toggle()"
            class="px-2 py-2 bg-indigo-600 text-white rounded-r-lg border-l border-indigo-500 hover:bg-indigo-700 focus:outline-none transition-all shadow-sm">
            <svg class="w-4 h-4 transition-transform duration-200" [ngClass]="isOpen() ? 'rotate-180' : ''" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        }
    </div>

    <!-- Dropdown Menu -->
    @if (isOpen()) {
    <div [ngClass]="[
            'absolute z-50 mt-2 min-w-[220px] max-h-[280px] overflow-y-auto bg-white/95 dark:bg-[#1a222c]/95 backdrop-blur-lg border border-gray-200 dark:border-white/10 rounded-2xl shadow-xl animate-in fade-in zoom-in duration-200',
            align === 'right' ? 'right-0 origin-top-right' : 'left-0 origin-top-left'
        ]">
        <div class="py-2 px-1.5 space-y-0.5">
            @for (item of items; track $index) {
            <!-- Section Header -->
            @if (item.section) {
            <div class="px-4 py-2 text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                {{ item.section }}
            </div>
            }

            <!-- Divider -->
            @if (item.divider) {
            <div class="h-px bg-gray-100 dark:bg-white/10 my-2 mx-2"></div>
            }

            <!-- Regular Item -->
            @if (!item.divider && !item.section) {
            <button (click)="handleItemClick(item)" [ngClass]="[
                            'w-full flex items-center px-4 py-3 text-[15px] font-medium transition-all duration-200 rounded-xl',
                            item.danger ? 'text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20' : 'text-gray-900 dark:text-gray-100 hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600'
                        ]">
                @if (item.icon) {
                <span class="mr-3 w-5 h-5 flex items-center justify-center">
                    <i [class]="item.icon"></i>
                </span>
                }
                {{ item.label }}
            </button>
            }
            }
        </div>
    </div>
    }
</div>
