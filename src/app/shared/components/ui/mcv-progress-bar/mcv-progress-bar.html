<div class="w-full">
    <!-- Header Label -->
    @if (label && !labelInside) {
    <div class="flex justify-between text-sm mb-1.5">
        <span class="font-medium text-gray-700 dark:text-gray-300">{{ label }}</span>
        @if (showValue) {
        <span class="text-gray-500 dark:text-gray-400">{{ value }}{{ max === 100 ? '%' : '/' + max }}</span>
        }
    </div>
    }

    <!-- Progress Track -->
    <div [ngClass]="[
        'w-full bg-gray-200 dark:bg-white/10 rounded-full overflow-hidden',
        getSizeClasses()
    ]">
        <!-- Progress Fill -->
        <div [ngClass]="[
            'bar-fill h-full rounded-full transition-all duration-1000 flex items-center',
            variant === 'shimmer' ? 'shimmer' : '',
            variant === 'striped' ? 'striped' : ''
        ]" [ngStyle]="{'width': percentage + '%', 'background': color}">
            <!-- Inside Label -->
            @if (labelInside) {
            <span class="text-white text-[10px] font-bold px-2 whitespace-nowrap">
                {{ label }} {{ value }}%
            </span>
            }
            @if (size === 'lg' && showValue && !labelInside) {
            <span class="ml-auto pr-2 text-white text-[10px] font-bold">
                {{ value }}%
            </span>
            }
        </div>
    </div>
</div>
