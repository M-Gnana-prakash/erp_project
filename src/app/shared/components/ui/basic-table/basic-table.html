<div
    class="w-full overflow-x-auto rounded-lg shadow-sm border border-stroke dark:border-strokedark bg-white dark:bg-boxdark">
    <table class="w-full text-left border-collapse" [ngClass]="{ 'border': bordered }">
        <thead class="bg-gray-2 dark:bg-meta-4">
            <tr>
                @for (col of columns; track col.field) {
                <th class="font-semibold text-black dark:text-white uppercase tracking-wider transition-all" [ngClass]="{
              'px-6 py-4 text-sm': !compact,
              'px-4 py-2 text-xs': compact,
              'border border-stroke dark:border-strokedark': bordered
            }">
                    {{ col.header }}
                </th>
                }
            </tr>
        </thead>
        <tbody class="divide-y divide-stroke dark:divide-strokedark">
            @for (row of data; track $index) {
            <tr class="transition-colors duration-200" [ngClass]="{
            'bg-gray-50/50 dark:bg-white/2': striped && $index % 2 !== 0,
            'hover:bg-gray-100 dark:hover:bg-white/5': hover
          }">
                @for (col of columns; track col.field) {
                <td class="text-body dark:text-bodydark" [ngClass]="{
                'px-6 py-4 text-sm font-medium': !compact,
                'px-4 py-2 text-xs': compact,
                'border border-stroke dark:border-strokedark': bordered
              }">
                    {{ row[col.field] }}
                </td>
                }
            </tr>
            } @empty {
            <tr>
                <td [attr.colspan]="columns.length"
                    class="px-6 py-10 text-center text-gray-500 dark:text-gray-400 italic">
                    No data available to display.
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
