<div class="flex flex-col items-center gap-2">
    <div [ngSwitch]="variant" [ngClass]="[color, getSizeClasses()]">
        <!-- Default Circle Spinner -->
        <svg *ngSwitchCase="'circle'" class="animate-spin w-full h-full" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
        </svg>

        <!-- Pulsing Dots -->
        <div *ngSwitchCase="'dots'" class="flex gap-1 justify-center items-center h-full">
            <div class="w-[25%] h-[25%] bg-current rounded-full animate-bounce"></div>
            <div class="w-[25%] h-[25%] bg-current rounded-full animate-bounce [animation-delay:0.2s]"></div>
            <div class="w-[25%] h-[25%] bg-current rounded-full animate-bounce [animation-delay:0.4s]"></div>
        </div>

        <!-- Pulse Ring -->
        <div *ngSwitchCase="'pulse'" class="w-full h-full rounded-full bg-current animate-ping opacity-75"></div>

        <!-- Rotating Bars -->
        <div *ngSwitchCase="'bars'" class="flex gap-1 justify-center items-end h-full">
            <div class="w-[15%] h-[40%] bg-current animate-[loading-bar_1s_ease-in-out_infinite]"></div>
            <div class="w-[15%] h-[60%] bg-current animate-[loading-bar_1s_ease-in-out_0.2s_infinite]"></div>
            <div class="w-[15%] h-full bg-current animate-[loading-bar_1s_ease-in-out_0.4s_infinite]"></div>
        </div>
    </div>

    <span *ngIf="label" class="text-xs font-medium text-gray-500 dark:text-gray-400">{{ label }}</span>
</div>
