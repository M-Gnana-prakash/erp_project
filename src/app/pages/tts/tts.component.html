<div class="p-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Without Backend -->
        <div
            class="rounded-2xl overflow-hidden shadow-md border border-sky-100 bg-white dark:bg-boxdark hover:-translate-y-1 transition-transform duration-200">

            <!-- Header -->
            <div class="bg-gradient-to-r from-sky-400 to-sky-600 px-6 py-4 flex items-center gap-3">
                <div class="flex-1">
                    <h3 class="text-white font-bold text-base">Without Backend</h3>
                </div>
                <span
                    class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide">Live</span>
            </div>

            <!-- Body -->
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-sky-600 uppercase tracking-wide mb-2">Enter
                        Text</label>
                    <textarea [(ngModel)]="textToSpeakA" rows="4"
                        class="w-full rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition resize-none"
                        placeholder="Type something to speak..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label
                            class="block text-xs font-semibold text-sky-600 uppercase tracking-wide mb-2">Language</label>
                        <select [value]="selectedLanguage" (change)="onLanguageChangeA($event)"
                            class="w-full rounded-xl border border-sky-200 bg-sky-50 px-3 py-2.5 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-sky-400 transition">
                            <option value="en-US">🇺🇸 English (US)</option>
                            <option value="en-GB">🇬🇧 English (UK)</option>
                            <option value="es-ES">🇪🇸 Spanish</option>
                            <option value="fr-FR">🇫🇷 French</option>
                            <option value="hi-IN">🇮🇳 Hindi</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-semibold text-sky-600 uppercase tracking-wide mb-2">Voice</label>
                        <select (change)="onVoiceChangeA($event)"
                            class="w-full rounded-xl border border-sky-200 bg-sky-50 px-3 py-2.5 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-sky-400 transition">
                            <option *ngFor="let voice of voices" [value]="voice.name"
                                [selected]="selectedVoice?.name === voice.name">
                                {{ voice.name }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button (click)="speakA()"
                        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-sky-500 hover:bg-sky-600 text-white font-semibold text-sm transition shadow-sm hover:shadow-md">
                        ▶ Start
                    </button>
                    <button (click)="stopSpeechA()"
                        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold text-sm transition shadow-sm hover:shadow-md">
                        X Stop
                    </button>
                </div>
            </div>
        </div>

        <!-- With Backend -->
        <div
            class="rounded-2xl overflow-hidden shadow-md border border-sky-100 bg-white dark:bg-boxdark hover:-translate-y-1 transition-transform duration-200">

            <!-- Header -->
            <div class="bg-gradient-to-r from-sky-500 to-blue-700 px-6 py-4 flex items-center gap-3">
                <div class="flex-1">
                    <h3 class="text-white font-bold text-base">With Backend</h3>
                </div>
                <span
                    class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide">API</span>
            </div>

            <!-- Body -->
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-sky-600 uppercase tracking-wide mb-2">Enter
                        Text</label>
                    <textarea [(ngModel)]="textToSpeakB" rows="4"
                        class="w-full rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition resize-none"
                        placeholder="Type something to generate audio..."></textarea>
                </div>

                <div class="mb-4">
                    <label
                        class="block text-xs font-semibold text-sky-600 uppercase tracking-wide mb-2">Language</label>
                    <select [(ngModel)]="selectedLanguageB"
                        class="w-full rounded-xl border border-sky-200 bg-sky-50 px-3 py-2.5 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
                        <option value="en-US">🇺🇸 English (US)</option>
                        <option value="en-GB">🇬🇧 English (UK)</option>
                        <option value="es-ES">🇪🇸 Spanish</option>
                        <option value="fr-FR">🇫🇷 French</option>
                        <option value="hi-IN">🇮🇳 Hindi</option>
                    </select>
                </div>

                <div class="flex gap-3">
                    <button (click)="generateFromBackend()" [disabled]="isBackendProcessing"
                        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-sky-500 hover:bg-sky-600 text-white font-semibold text-sm transition shadow-sm hover:shadow-md">
                        {{ isBackendProcessing ? '⏳ Generating...' : '▶ Start' }}
                    </button>
                    <button (click)="stopAudioB()"
                        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold text-sm transition shadow-sm hover:shadow-md">
                        X Stop
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
