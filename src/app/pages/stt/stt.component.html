<div class="p-6">
    <div class="max-w-3xl mx-auto">
        <div
            class="rounded-2xl overflow-hidden shadow-md border border-indigo-100 bg-white dark:bg-boxdark hover:-translate-y-1 transition-transform duration-200">

            <!-- Header -->
            <div
                class="bg-gradient-to-r from-indigo-500 to-purple-600 px-6 py-4 flex items-center justify-between gap-3">

                <div class="flex items-center gap-3">
                    <h3 class="text-white font-bold text-base">
                        Speech to Text Transcriber
                    </h3>

                    @if (isRecording) {
                    <div
                        class="flex items-center gap-1.5 bg-red-500/80 px-2 py-0.5 rounded-full backdrop-blur-sm animate-pulse">
                        <div class="w-2 h-2 rounded-full bg-white"></div>
                        <span class="text-[10px] font-bold text-white uppercase tracking-wider">
                            Rec
                        </span>
                    </div>
                    }
                </div>

                <span
                    class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide">
                    Web Speech API
                </span>
            </div>

            <!-- Body -->
            <div class="p-6">

                <!-- Status -->
                <div class="flex items-center gap-3 mb-4">
                    <p class="text-xs text-gray-500">
                        {{ isRecording ? '🎤 Listening...' : '🛑 Not Recording' }}
                    </p>
                    @if (errorMessage) {
                    <p
                        class="text-xs text-red-600 font-semibold bg-red-50 border border-red-100 px-2 py-1 rounded shadow-sm">
                        ⚠️ {{ errorMessage }}
                    </p>
                    }
                </div>

                <!-- Language -->
                <div
                    class="mb-5 flex flex-col sm:flex-row justify-end space-y-4 sm:space-y-0 sm:space-x-4 items-center sm:items-end">

                    <div class="flex items-center">
                        <label class="relative inline-flex items-center cursor-pointer"
                            title="Auto-translate non-English speech to English">
                            <input type="checkbox" [(ngModel)]="translateToEnglish" class="sr-only peer">
                            <div
                                class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-400 dark:peer-focus:ring-indigo-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-indigo-600">
                            </div>
                            <span class="ml-3 text-sm font-semibold text-gray-700 dark:text-gray-300 mr-2">Translate to
                                English</span>
                        </label>
                    </div>

                    <div class="w-full sm:w-64">
                        <label class="block text-xs font-semibold text-indigo-600 uppercase tracking-wide mb-2">
                            Language
                        </label>

                        <select [(ngModel)]="selectedLanguage" (ngModelChange)="onLanguageChange()"
                            class="w-full rounded-xl border border-indigo-200 bg-indigo-50 px-3 py-2 text-sm text-gray-800 dark:text-white dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">

                            <option value="en-IN">🇮🇳 English (India)</option>
                            <option value="en-US">🇺🇸 English (US)</option>
                            <option value="en-GB">🇬🇧 English (UK)</option>
                            <option value="es-ES">🇪🇸 Spanish</option>
                            <option value="fr-FR">🇫🇷 French</option>
                            <option value="hi-IN">🇮🇳 Hindi</option>
                            <option value="ta-IN">🇮🇳 Tamil</option>
                        </select>
                    </div>
                </div>

                <!-- Text Area -->
                <div class="mb-5">
                    <label class="block text-xs font-semibold text-indigo-600 uppercase tracking-wide mb-2">
                        Original Speech Text
                    </label>

                    <div class="relative group mb-4">
                        <textarea [ngModel]="displayOriginalText" (ngModelChange)="originalText = $event"
                            [readonly]="isRecording" rows="3" aria-live="polite"
                            class="w-full rounded-xl border border-indigo-200 bg-indigo-50 px-4 py-3 text-sm text-gray-800 dark:text-gray-200 dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition resize-none leading-relaxed"
                            placeholder="Click 'Start Recording' and speak into your microphone..."
                            [class.opacity-90]="isRecording" [class.bg-indigo-100]="isRecording">
                        </textarea>
                    </div>

                    @if(translateToEnglish && !selectedLanguage.startsWith('en')) {
                    <label class="block text-xs font-semibold text-indigo-600 uppercase tracking-wide mb-2 mt-4">
                        Translated Text (English)
                    </label>

                    <div class="relative group">
                        <textarea [ngModel]="displayTranslatedText" (ngModelChange)="transcribedText = $event"
                            [readonly]="isRecording" rows="3" aria-live="polite"
                            class="w-full rounded-xl border border-indigo-200 bg-indigo-50 px-4 py-3 text-sm text-gray-800 dark:text-gray-200 dark:bg-boxdark dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition resize-none leading-relaxed"
                            placeholder="Translation will appear here..." [class.opacity-90]="isRecording"
                            [class.bg-indigo-100]="isRecording">
                        </textarea>
                    </div>
                    }
                </div>

                <!-- Controls -->
                <div
                    class="flex flex-wrap items-center gap-4 border-t border-indigo-100 dark:border-gray-700 pt-5 mt-2">

                    @if (!isRecording) {
                    <button (click)="startRecording()" [disabled]="!recognition"
                        class="flex items-center justify-center gap-2 px-8 py-3 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm sm:text-base transition-all shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-0.5 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                            </path>
                        </svg>

                        Start Recording
                    </button>
                    }
                    @else {
                    <button (click)="stopRecording()"
                        class="flex items-center justify-center gap-2 px-8 py-3 rounded-full bg-red-500 hover:bg-red-600 text-white font-bold text-sm sm:text-base transition-all shadow-lg hover:shadow-red-500/30 animate-pulse hover:animate-none active:scale-95 ring-4 ring-red-500/20">

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z">
                            </path>
                        </svg>

                        Stop Recording
                    </button>
                    }

                    <button (click)="clearText()"
                        class="ml-auto flex items-center justify-center gap-2 px-6 py-2.5 rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 font-semibold text-sm transition-colors active:scale-95 border border-gray-200 dark:border-gray-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                        Clear Text
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>
