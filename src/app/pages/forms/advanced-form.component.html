  class="prescription-container shadow-2xl overflow-hidden bg-white mx-auto my-8 max-w-4xl border border-gray-100 rounded-lg">
  <!-- Top Blueprint Bar -->
  <!-- <div class="h-4 bg-blue-600"></div> -->

  <!-- Global Voice Control -->
  <div class="px-8 py-4 bg-blue-50 border-b border-blue-100 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button type="button" (click)="toggleGlobalMic()" [class.recording-active]="isListeningGlobal()"
        class="flex items-center gap-2 px-6 py-2.5 rounded-full bg-blue-600 hover:bg-blue-700 text-white font-bold transition-all shadow-md active:scale-95 disabled:bg-gray-400"
        [disabled]="isProcessing()">
        @if (isListeningGlobal()) {
        <span class="flex h-3 w-3 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
        </span>
        <span>STOP MIC</span>
        } @else {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
        </svg>
        <span>MIC OPTIONS</span>
        }
      </button>
      <div class="h-8 w-px bg-blue-200"></div>
      <p class="text-sm text-blue-600 italic font-medium">
        {{ statusMessage() }}
      </p>
    </div>
    @if (isProcessing()) {
    <div class="flex items-center gap-2 text-blue-800 font-semibold text-sm">
      <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
      </svg>
      <span>PROCESSING...</span>
    </div>
    }
  </div>

  <!-- Form Content -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-8">
    <!-- Patient Demographic Row -->
    <div class="grid grid-cols-12 gap-6 mb-8 bg-gray-50/50 p-6 rounded-xl border border-dashed border-gray-200">
      <div class="col-span-6">
        <app-mcv-input-field label="Patient Name" [value]="form.get('patientName')?.value"
          (statusChange)="handleStatusChange('patientName', $event)"
          [placeholder]="'Enter full name'"></app-mcv-input-field>
      </div>
      <div class="col-span-3">
        <app-mcv-input-field label="Age" [value]="form.get('age')?.value"
          (statusChange)="handleStatusChange('age', $event)" [placeholder]="'e.g. 25'"></app-mcv-input-field>
      </div>
      <div class="col-span-3">
        <app-mcv-input-field label="Gender" [value]="form.get('gender')?.value"
          (statusChange)="handleStatusChange('gender', $event)" [placeholder]="'M/F/O'"></app-mcv-input-field>
      </div>
    </div>

    <!-- RX Section -->
    <div class="mb-10">
      <!-- <div class="flex items-center gap-2 mb-4">
        <span class="text-4xl font-serif font-black text-gray-800">Rx</span>
        <div class="h-px flex-grow bg-gray-200"></div>
      </div> -->

      <!-- clinical history, findings, impression -->
      <div class="grid grid-cols-1 gap-8">
        <!-- Clinical History -->
        <div class="relative">
          <app-mcv-text-area label="Clinical History" [value]="form.get('clinicalHistory')?.value"
            (statusChange)="handleStatusChange('clinicalHistory', $event)" [placeholder]="'......'"
            [rows]="3"></app-mcv-text-area>
          <button type="button" (click)="toggleFieldMic('clinicalHistory')"
            [class.mic-active]="activeField() === 'clinicalHistory'"
            class="absolute top-8 right-2 p-2 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
          </button>
        </div>


        <!-- Technique -->
        <div class="relative">
          <app-mcv-text-area label="Technique" [value]="form.get('technique')?.value"
            (statusChange)="handleStatusChange('technique', $event)" [placeholder]="'......'"
            [rows]="3"></app-mcv-text-area>
          <button type="button" (click)="toggleFieldMic('technique')" [class.mic-active]="activeField() === 'technique'"
            class="absolute top-8 right-2 p-2 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
          </button>
        </div>

        <!-- Findings -->
        <div class="relative">
          <app-mcv-text-area label="Physical Findings" [value]="form.get('findings')?.value"
            (statusChange)="handleStatusChange('findings', $event)" [placeholder]="'......'"
            [rows]="3"></app-mcv-text-area>
          <button type="button" (click)="toggleFieldMic('findings')" [class.mic-active]="activeField() === 'findings'"
            class="absolute top-8 right-2 p-2 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
          </button>
        </div>

        <!-- Impression -->
        <div class="relative">
          <app-mcv-text-area label="Clinical Impression" [value]="form.get('impression')?.value"
            (statusChange)="handleStatusChange('impression', $event)" [placeholder]="'......'"></app-mcv-text-area>
          <button type="button" (click)="toggleFieldMic('impression')"
            [class.mic-active]="activeField() === 'impression'"
            class="absolute top-8 right-2 p-2 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
          </button>
        </div>
      </div>
    </div>



    <!-- Suggestions/Voice Help -->
    @if (suggestions().length > 0) {
    <div class="mb-8 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
      <p class="text-xs font-bold text-yellow-700 uppercase mb-2">Did you say?</p>
      <div class="flex flex-wrap gap-2">
        @for (s of suggestions(); track s) {
        <button type="button" (click)="applySuggestion(s)"
          class="px-3 py-1 bg-white border border-yellow-300 text-yellow-800 rounded-lg text-sm hover:bg-yellow-100 transition-colors">
          {{ s }}
        </button>
        }
      </div>
    </div>
    }

    <!-- Action Buttons -->
    <div class="flex justify-end gap-4 mb-12 border-t border-gray-100 pt-8">
      <button type="button" (click)="form.reset()"
        class="px-8 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all active:scale-95">
        RESET
      </button>
      <button type="submit" [disabled]="isProcessing()"
        class="px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg flex items-center gap-2 active:scale-95 disabled:bg-gray-400">
        @if (isProcessing()) {
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
        SAVING...
        } @else {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        SAVE
        }
      </button>
    </div>
  </form>
</div>
