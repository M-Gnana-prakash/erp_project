<div class="mx-auto max-w-screen-2xl p-4 md:p-6 2xl:p-10">

    <div class="grid grid-cols-1 gap-9">
        <div class="flex flex-col gap-9">
            <!-- Controls Demo -->
            <div class="p-6 bg-white dark:bg-boxdark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5">
                <h3 class="text-xl font-semibold mb-4 dark:text-white">Tree Structure</h3>
                <div class="flex flex-wrap gap-6">
                    <label class="flex items-center gap-2 cursor-pointer dark:text-gray-300">
                        <input type="checkbox" [(ngModel)]="isReadOnly"
                            class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                        Read Only
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer dark:text-gray-300">
                        <input type="checkbox" [(ngModel)]="rbacAdd"
                            class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                        Add
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer dark:text-gray-300">
                        <input type="checkbox" [(ngModel)]="rbacEdit"
                            class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                        Edit
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer dark:text-gray-300">
                        <input type="checkbox" [(ngModel)]="rbacDelete"
                            class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                        Delete
                    </label>
                </div>
            </div>

            <!-- Data Tree Example -->
            <app-mcv-datatree [data]="treeData" [readOnly]="isReadOnly" [canAdd]="rbacAdd" [canEdit]="rbacEdit"
                [canDelete]="rbacDelete" [canExpandCollapse]="rbacExpandCollapse" (onAdd)="onNodeAdd($event)"
                (onDelete)="onNodeDelete($event)" (onUpdate)="onNodeUpdate($event)">
            </app-mcv-datatree>
        </div>
    </div>
</div>
