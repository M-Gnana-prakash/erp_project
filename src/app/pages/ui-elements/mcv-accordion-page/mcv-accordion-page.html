<div class="p-6 space-y-10">
    <!-- Header -->
    <div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Accordion</h2>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Reusable accordion component for collapsible content sections.
        </p>
    </div>

    <!-- ── Default Style ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Default (Card
            Style)</h3>
        <app-mcv-accordion [items]="defaultItems" variant="default" [allowMultiple]="false"></app-mcv-accordion>
    </section>

    <!-- ── Flush Style ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Flush (Border
            Only)</h3>
        <app-mcv-accordion [items]="flushItems" variant="flush" [allowMultiple]="true"></app-mcv-accordion>
    </section>

    <!-- ── With Icons ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">With Icons
        </h3>
        <app-mcv-accordion [items]="iconItems" variant="icon"></app-mcv-accordion>
    </section>
</div>
