<div class="p-6 space-y-10">
    <div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Modals</h2>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Dynamic modal dialogs with integrated Avatar, Badge, and Alert
            support.</p>
    </div>

    <!-- Trigger Buttons -->
    <div class="flex flex-wrap gap-4">
        @for (modal of modalConfigs; track modal.id) {
        <button (click)="toggleModal(modal.id)" [ngClass]="{
                    'px-6 py-2.5 text-white rounded-xl shadow-lg transition-all font-medium': true,
                    'bg-indigo-600 shadow-indigo-500/30 hover:bg-indigo-700': modal.id === 'basic',
                    'bg-purple-600 shadow-purple-500/30 hover:bg-purple-700': modal.id === 'profile',
                    'bg-red-600 shadow-red-500/30 hover:bg-red-700': modal.id === 'alert',
                    'bg-green-600 shadow-green-500/30 hover:bg-green-700': modal.id === 'dynamic'
                }">
            {{modal.title}}
        </button>
        }
    </div>

    <!-- Data-driven Modals -->
    @for (modal of modalConfigs; track modal.id) {
    <app-mcv-modal [title]="modal.title" [isOpen]="modal.isOpen()" (close)="toggleModal(modal.id)"
        [content]="modal.content || ''" [buttons]="modal.buttons || []" [avatarSrc]="modal.avatarSrc || ''"
        [avatarInitials]="modal.avatarInitials || ''" [avatarName]="modal.avatarName || ''"
        [avatarSize]="modal.avatarSize || 'sm'" [badgeLabel]="modal.badgeLabel || ''"
        [badgeVariant]="modal.badgeVariant || 'primary'" [badgeSoft]="modal.badgeSoft !== false"
        [titleIcon]="modal.titleIcon || ''" [showAlert]="modal.showAlert || false" [alertTitle]="modal.alertTitle || ''"
        [alertMessage]="modal.alertMessage || ''" [alertType]="modal.alertType || 'info'"
        [alertDismissible]="modal.alertDismissible !== false">
    </app-mcv-modal>
    }
</div>
