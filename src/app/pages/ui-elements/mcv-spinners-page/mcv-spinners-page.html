<div class="p-6 space-y-10">
    <!-- Header -->
    <div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Spinners</h2>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Reusable loading indicators with different animation styles and
            sizes.</p>
    </div>

    <!-- ── Basic Circle ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Circle
            Spinners (Sizes)</h3>
        <div class="flex flex-wrap items-end gap-6">
            <app-mcv-spinner size="xs" label="xs"></app-mcv-spinner>
            <app-mcv-spinner size="sm" label="sm"></app-mcv-spinner>
            <app-mcv-spinner size="md" label="md"></app-mcv-spinner>
            <app-mcv-spinner size="lg" label="lg"></app-mcv-spinner>
            <app-mcv-spinner size="xl" label="xl"></app-mcv-spinner>
        </div>
    </section>

    <!-- ── Variations ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Animation
            Styles</h3>
        <div class="flex flex-wrap items-center gap-12">
            <app-mcv-spinner variant="circle" label="Circle" color="text-indigo-600"></app-mcv-spinner>
            <app-mcv-spinner variant="dots" label="Dots" color="text-green-500"></app-mcv-spinner>
            <app-mcv-spinner variant="pulse" label="Pulse" color="text-red-500"></app-mcv-spinner>
            <app-mcv-spinner variant="bars" label="Bars" color="text-yellow-500"></app-mcv-spinner>
        </div>
    </section>

    <!-- ── Colors ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Custom Colors
        </h3>
        <div class="flex flex-wrap gap-8">
            <app-mcv-spinner color="text-blue-500"></app-mcv-spinner>
            <app-mcv-spinner color="text-purple-500"></app-mcv-spinner>
            <app-mcv-spinner color="text-pink-500"></app-mcv-spinner>
            <app-mcv-spinner color="text-orange-500"></app-mcv-spinner>
        </div>
    </section>
</div>
