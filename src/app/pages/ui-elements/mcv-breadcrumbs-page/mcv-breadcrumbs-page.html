<div class="p-6 space-y-10">
    <!-- Header -->
    <div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Breadcrumbs</h2>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Reusable breadcrumb component with different dynamic separators
            and styles.</p>
    </div>

    <!-- ── Default Style ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Default (Slash
            Separator)</h3>
        <app-mcv-breadcrumbs [items]="defaultBreadcrumbs"></app-mcv-breadcrumbs>
    </section>

    <!-- ── Arrow Style ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">Arrow
            Separator</h3>
        <app-mcv-breadcrumbs [items]="arrowBreadcrumbs" separator=">"></app-mcv-breadcrumbs>
    </section>

    <!-- ── Background Style ── -->
    <section>
        <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-4">With
            Background</h3>
        <app-mcv-breadcrumbs [items]="bgBreadcrumbs" separator="-" variant="background"></app-mcv-breadcrumbs>
    </section>
</div>
